openapi: 3.1.0
info:
  title: Scrapper Freelance API - LinkedIn Job Bot Foundation
  version: 0.1.0
  description: API contract for backend-triggered LinkedIn job-search runs and reviewable job opportunities.
paths:
  /job-search-runs:
    post:
      summary: Start a LinkedIn job-search run
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobSearchRunCreate"
      responses:
        "202":
          description: Job search run accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobSearchRun"
    get:
      summary: List LinkedIn job-search runs
      parameters:
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/JobSearchRunStatus"
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Job search runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobSearchRun"
  /job-search-runs/{run_id}:
    get:
      summary: Get LinkedIn job-search run status
      parameters:
        - in: path
          name: run_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Job search run detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobSearchRun"
        "404":
          description: Run not found
  /job-search-runs/{run_id}/candidates:
    get:
      summary: List inspected candidates for a run
      parameters:
        - in: path
          name: run_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: outcome
          schema:
            $ref: "#/components/schemas/JobCandidateOutcome"
      responses:
        "200":
          description: Candidate outcomes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobSearchCandidate"
  /job-search-runs/{run_id}/opportunities:
    get:
      summary: List accepted job opportunities from a run
      parameters:
        - in: path
          name: run_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Accepted job opportunities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobOpportunity"
  /opportunities:
    get:
      summary: List opportunities, including captured job opportunities
      parameters:
        - in: query
          name: opportunity_type
          schema:
            type: string
            enum: [job, freelance]
        - in: query
          name: contact_channel
          schema:
            type: string
        - in: query
          name: matched_keyword
          schema:
            type: string
      responses:
        "200":
          description: Opportunity list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobOpportunity"
  /opportunities/{opportunity_id}:
    get:
      summary: Get opportunity detail
      parameters:
        - in: path
          name: opportunity_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Opportunity detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobOpportunity"
    patch:
      summary: Update review fields for a job opportunity
      parameters:
        - in: path
          name: opportunity_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobOpportunityUpdate"
      responses:
        "200":
          description: Opportunity updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobOpportunity"
components:
  schemas:
    JobSearchRunStatus:
      type: string
      enum: [pending, running, completed, completed_no_results, failed]
    JobCandidateOutcome:
      type: string
      enum:
        - accepted
        - rejected_no_contact
        - rejected_weak_match
        - rejected_missing_evidence
        - duplicate
        - failed_parse
    ContactChannelType:
      type: string
      enum: [email, linkedin, other_public_contact]
    JobSearchRunCreate:
      type: object
      properties:
        keyword_set_id:
          type: string
          format: uuid
        keywords:
          type: array
          items:
            type: string
        candidate_limit:
          type: integer
          minimum: 1
          maximum: 50
          default: 50
    JobSearchRun:
      type: object
      required:
        - id
        - status
        - requested_keywords
        - candidate_limit
        - inspected_count
        - accepted_count
        - rejected_count
        - duplicate_count
        - cap_reached
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/JobSearchRunStatus"
        keyword_set_id:
          type: string
          format: uuid
        requested_keywords:
          type: array
          minItems: 1
          items:
            type: string
        source_name:
          type: string
          default: LinkedIn
        candidate_limit:
          type: integer
          maximum: 50
        inspected_count:
          type: integer
          minimum: 0
        accepted_count:
          type: integer
          minimum: 0
        rejected_count:
          type: integer
          minimum: 0
        duplicate_count:
          type: integer
          minimum: 0
        cap_reached:
          type: boolean
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        error_message:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    JobSearchCandidate:
      type: object
      required:
        - id
        - run_id
        - outcome
        - source_query
        - matched_keywords
        - created_at
      properties:
        id:
          type: string
          format: uuid
        run_id:
          type: string
          format: uuid
        opportunity_id:
          type: string
          format: uuid
        outcome:
          $ref: "#/components/schemas/JobCandidateOutcome"
        company_name:
          type: string
        role_title:
          type: string
        post_headline:
          type: string
        job_description:
          type: string
        contact_channel_type:
          $ref: "#/components/schemas/ContactChannelType"
        contact_channel_value:
          type: string
        source_url:
          type: string
        source_query:
          type: string
        source_evidence:
          type: string
        matched_keywords:
          type: array
          items:
            type: string
        dedupe_key:
          type: string
        rejection_reason:
          type: string
        inspected_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
    JobOpportunity:
      type: object
      required:
        - id
        - opportunity_type
        - title
        - source_query
        - source_evidence
        - matched_keywords
        - contact_channel_value
        - job_stage
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        opportunity_type:
          type: string
          enum: [job]
        company_name:
          type: string
        title:
          type: string
        post_headline:
          type: string
        job_description:
          type: string
        contact_channel_type:
          $ref: "#/components/schemas/ContactChannelType"
        contact_channel_value:
          type: string
        contact_email:
          type: string
        source_name:
          type: string
          default: LinkedIn
        source_url:
          type: string
        source_query:
          type: string
        source_evidence:
          type: string
        matched_keywords:
          type: array
          minItems: 1
          items:
            type: string
        dedupe_key:
          type: string
        job_stage:
          type: string
          enum: [new, saved, applied, responded, interview, rejected, ignored]
        operator_notes:
          type: string
        captured_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    JobOpportunityUpdate:
      type: object
      properties:
        job_stage:
          type: string
          enum: [new, saved, applied, responded, interview, rejected, ignored]
        operator_notes:
          type: string
