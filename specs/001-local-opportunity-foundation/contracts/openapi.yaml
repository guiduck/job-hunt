openapi: 3.1.0
info:
  title: Scrapper Freelance API - Local Opportunity Foundation
  version: 0.1.0
  description: API contract for local opportunity persistence across freelance and job lanes.
paths:
  /health:
    get:
      summary: Check API health
      responses:
        "200":
          description: API is healthy
  /campaigns:
    get:
      summary: List campaigns
      parameters:
        - in: query
          name: opportunity_type
          schema:
            $ref: "#/components/schemas/OpportunityType"
        - in: query
          name: status
          schema:
            type: string
      responses:
        "200":
          description: Campaign list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Campaign"
    post:
      summary: Create campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignCreate"
      responses:
        "201":
          description: Campaign created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
  /keyword-sets:
    get:
      summary: List keyword sets
      parameters:
        - in: query
          name: source
          schema:
            type: string
            enum: [manual, mock, cv]
        - in: query
          name: active
          schema:
            type: boolean
      responses:
        "200":
          description: Keyword set list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KeywordSet"
    post:
      summary: Create keyword set
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KeywordSetCreate"
      responses:
        "201":
          description: Keyword set created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeywordSet"
  /opportunities:
    get:
      summary: List opportunities
      parameters:
        - in: query
          name: opportunity_type
          schema:
            $ref: "#/components/schemas/OpportunityType"
        - in: query
          name: campaign_id
          schema:
            type: string
            format: uuid
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: q
          schema:
            type: string
      responses:
        "200":
          description: Opportunity list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Opportunity"
    post:
      summary: Create opportunity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpportunityCreate"
      responses:
        "201":
          description: Opportunity created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Opportunity"
  /opportunities/{opportunity_id}:
    get:
      summary: Get opportunity detail
      parameters:
        - in: path
          name: opportunity_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Opportunity detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Opportunity"
    patch:
      summary: Update opportunity review fields
      parameters:
        - in: path
          name: opportunity_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpportunityUpdate"
      responses:
        "200":
          description: Opportunity updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Opportunity"
  /opportunities/{opportunity_id}/interactions:
    post:
      summary: Add opportunity interaction
      parameters:
        - in: path
          name: opportunity_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InteractionCreate"
      responses:
        "201":
          description: Interaction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Interaction"
components:
  schemas:
    OpportunityType:
      type: string
      enum: [freelance, job]
    CampaignCreate:
      type: object
      required: [name, opportunity_type]
      properties:
        name:
          type: string
        opportunity_type:
          $ref: "#/components/schemas/OpportunityType"
        market_scope:
          type: string
          enum: [domestic, international]
        target_niche:
          type: string
        target_region:
          type: string
        target_city:
          type: string
        notes:
          type: string
    Campaign:
      allOf:
        - $ref: "#/components/schemas/CampaignCreate"
        - type: object
          required: [id, status, created_at, updated_at]
          properties:
            id:
              type: string
              format: uuid
            status:
              type: string
              enum: [draft, collecting, paused, completed, archived]
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
    KeywordSetCreate:
      type: object
      required: [name, terms]
      properties:
        name:
          type: string
        source:
          type: string
          enum: [manual, mock, cv]
          default: manual
        opportunity_type:
          $ref: "#/components/schemas/OpportunityType"
        terms:
          type: array
          minItems: 1
          items:
            type: string
        is_active:
          type: boolean
          default: true
    KeywordSet:
      allOf:
        - $ref: "#/components/schemas/KeywordSetCreate"
        - type: object
          required: [id, is_default, created_at, updated_at]
          properties:
            id:
              type: string
              format: uuid
            is_default:
              type: boolean
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
    OpportunityCreate:
      type: object
      required: [opportunity_type, source_evidence]
      properties:
        campaign_id:
          type: string
          format: uuid
        opportunity_type:
          $ref: "#/components/schemas/OpportunityType"
        title:
          type: string
        organization_name:
          type: string
        category:
          type: string
        city:
          type: string
        region:
          type: string
        country:
          type: string
        source_name:
          type: string
        source_url:
          type: string
        source_query:
          type: string
        source_evidence:
          type: string
        score:
          type: integer
          minimum: 0
          maximum: 100
        freelance_detail:
          $ref: "#/components/schemas/FreelanceDetail"
        job_detail:
          $ref: "#/components/schemas/JobDetail"
    Opportunity:
      allOf:
        - $ref: "#/components/schemas/OpportunityCreate"
        - type: object
          required: [id, status, created_at, updated_at]
          properties:
            id:
              type: string
              format: uuid
            status:
              type: string
            operator_notes:
              type: string
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
    OpportunityUpdate:
      type: object
      properties:
        status:
          type: string
        operator_notes:
          type: string
        freelance_stage:
          type: string
        job_stage:
          type: string
        lead_temperature:
          type: string
          enum: [cold, warm, hot]
        demo_url:
          type: string
    FreelanceDetail:
      type: object
      properties:
        business_name:
          type: string
        contact_name:
          type: string
        phone:
          type: string
        email:
          type: string
        website_url:
          type: string
        website_status:
          type: string
          enum: [confirmed, not_identified, suspected, unknown]
        google_maps_url:
          type: string
        lead_temperature:
          type: string
          enum: [cold, warm, hot]
        freelance_stage:
          type: string
        demo_url:
          type: string
    JobDetail:
      type: object
      properties:
        company_name:
          type: string
        role_title:
          type: string
        post_headline:
          type: string
        contact_email:
          type: string
        application_url:
          type: string
        linkedin_url:
          type: string
        matched_keywords:
          type: array
          items:
            type: string
        job_stage:
          type: string
        response_notes:
          type: string
    InteractionCreate:
      type: object
      required: [interaction_type, summary]
      properties:
        interaction_type:
          type: string
        channel:
          type: string
        summary:
          type: string
        payload:
          type: object
    Interaction:
      allOf:
        - $ref: "#/components/schemas/InteractionCreate"
        - type: object
          required: [id, opportunity_id, created_at]
          properties:
            id:
              type: string
              format: uuid
            opportunity_id:
              type: string
              format: uuid
            created_at:
              type: string
              format: date-time
