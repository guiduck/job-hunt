openapi: 3.1.0
info:
  title: AI Field Assistant Contracts
  version: 0.1.0
  description: >
    Contract additions for authenticated field-assistant activation, AI answer
    generation, and reusable response suggestions. All endpoints require the
    existing bearer session and are owner-scoped.
paths:
  /field-assistant/activations:
    get:
      summary: List assistant activation scopes for the authenticated owner
      tags: [Field Assistant]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Activation scopes
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/FieldAssistantActivation"
    post:
      summary: Enable the assistant for a base domain or exact page
      tags: [Field Assistant]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FieldAssistantActivationCreate"
      responses:
        "201":
          description: Created or re-enabled activation scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FieldAssistantActivation"
  /field-assistant/activations/{activation_id}:
    patch:
      summary: Update enabled state or display name for an activation scope
      tags: [Field Assistant]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ActivationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FieldAssistantActivationUpdate"
      responses:
        "200":
          description: Updated activation scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FieldAssistantActivation"
    delete:
      summary: Remove an activation scope
      tags: [Field Assistant]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ActivationId"
      responses:
        "204":
          description: Removed
  /field-assistant/generate:
    post:
      summary: Generate a reviewable answer for one sanitized field context
      tags: [Field Assistant]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FieldAnswerGenerateRequest"
      responses:
        "200":
          description: Reviewable generated answer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FieldAnswerGenerateResponse"
        "400":
          description: Field context rejected as unsafe or insufficient
        "401":
          description: Missing or invalid app session
  /field-assistant/suggestions:
    get:
      summary: List up to 3 reusable responses for a keyword
      tags: [Field Assistant]
      security:
        - bearerAuth: []
      parameters:
        - name: keyword
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Suggestions for keyword
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    maxItems: 3
                    items:
                      $ref: "#/components/schemas/FieldResponseSuggestion"
    post:
      summary: Explicitly save a reusable response for a keyword
      tags: [Field Assistant]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FieldResponseSuggestionCreate"
      responses:
        "201":
          description: Saved suggestion; oldest/least useful extras are pruned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FieldResponseSuggestion"
  /field-assistant/suggestions/{suggestion_id}/used:
    post:
      summary: Record that a saved response was reused
      tags: [Field Assistant]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SuggestionId"
      responses:
        "200":
          description: Updated suggestion usage metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FieldResponseSuggestion"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    ActivationId:
      name: activation_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SuggestionId:
      name: suggestion_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    FieldAssistantActivation:
      type: object
      required: [id, scope_type, scope_value, enabled, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        scope_type:
          type: string
          enum: [base_domain, exact_page]
        scope_value:
          type: string
        display_name:
          type: string
          nullable: true
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
          nullable: true
    FieldAssistantActivationCreate:
      type: object
      required: [scope_type, scope_value]
      properties:
        scope_type:
          type: string
          enum: [base_domain, exact_page]
        scope_value:
          type: string
        display_name:
          type: string
          nullable: true
    FieldAssistantActivationUpdate:
      type: object
      properties:
        display_name:
          type: string
          nullable: true
        enabled:
          type: boolean
    FieldAnswerGenerateRequest:
      type: object
      required: [keyword, field_context, page_context]
      properties:
        keyword:
          type: string
        field_context:
          type: object
          required: [label_text]
          properties:
            label_text:
              type: string
              maxLength: 2000
            placeholder:
              type: string
              maxLength: 500
              nullable: true
            field_type:
              type: string
              enum: [textarea, long_text_input, contenteditable]
            existing_value:
              type: string
              maxLength: 4000
              nullable: true
            confidence:
              type: number
              minimum: 0
              maximum: 1
        page_context:
          type: object
          required: [origin]
          properties:
            origin:
              type: string
            sanitized_url:
              type: string
              nullable: true
            page_title:
              type: string
              maxLength: 300
              nullable: true
        template_hint:
          type: string
          maxLength: 1000
          nullable: true
    FieldAnswerGenerateResponse:
      type: object
      required: [answer_text, keyword, save_default]
      properties:
        answer_text:
          type: string
        keyword:
          type: string
        rationale:
          type: string
          nullable: true
        missing_context:
          type: array
          items:
            type: string
        save_default:
          type: boolean
          description: Always false unless the operator explicitly chooses save in a follow-up request.
    FieldResponseSuggestion:
      type: object
      required: [id, keyword, response_text, source, used_count, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        keyword:
          type: string
        field_label:
          type: string
          nullable: true
        field_context_summary:
          type: string
          nullable: true
        response_text:
          type: string
        source:
          type: string
          enum: [generated, edited, manual]
        used_count:
          type: integer
          minimum: 0
        last_used_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    FieldResponseSuggestionCreate:
      type: object
      required: [keyword, response_text, source]
      properties:
        keyword:
          type: string
        response_text:
          type: string
        source:
          type: string
          enum: [generated, edited, manual]
        field_label:
          type: string
          nullable: true
        field_context_summary:
          type: string
          nullable: true
