        source_url: "https://www.linkedin.com/feed/update/example"
        source_query: "hiring reactjs"
        source_evidence: "Hiring React Developer. Email jobs@example.com with your resume."
        matched_keywords: [reactjs]
        dedupe_key: "example co|frontend engineer|reactjs|jobs@example.com"
        job_stage: new
        created_at: "2026-04-30T21:00:00Z"
        updated_at: "2026-04-30T21:00:00Z"
    JobOpportunityLinkedInDm:
      summary: Accepted LinkedIn job opportunity with explicit DM contact
      value:
        id: "33333333-3333-3333-3333-333333333333"
        opportunity_type: job
        company_name: Example Studio
